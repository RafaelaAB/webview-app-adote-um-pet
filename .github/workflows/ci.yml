name: CI

# Dispara em push direto e em pull requests para develop e main
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Testes Unitários (Jest)
  # Falha automaticamente se a cobertura for menor que 90% em qualquer métrica,
  # pois o jest.config.ts já define coverageThreshold global de 90%.
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Testes Unitários (cobertura ≥ 90%)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Executar testes com relatório de cobertura
        run: npm run test:coverage

      # Salva o relatório de cobertura como artefato (visível na aba Summary)
      - name: Salvar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Testes E2E (Cypress)
  # Faz o build de produção, sobe o servidor e executa todos os specs do Cypress.
  # Salva screenshots e vídeos apenas quando algum teste falhar.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: Testes E2E (Cypress)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # A action oficial do Cypress cuida de instalar dependências, buildar,
      # subir o servidor, aguardar o app estar pronto e rodar os specs.
      - name: Executar testes Cypress
        uses: cypress-io/github-action@v6
        with:
          install-command: npm install
          build: npm run build
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 60

      # Screenshots são geradas automaticamente pelo Cypress em caso de falha
      - name: Salvar screenshots de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          if-no-files-found: ignore

      # Vídeos são gravados por padrão pelo Cypress (pode ser desabilitado via config)
      - name: Salvar vídeos dos testes
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: cypress/videos/
          if-no-files-found: ignore
